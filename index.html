<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Установка Grino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        .btn {
            display: block;
            background: #007aff;
            border: none;
            border-radius: 14px;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn:active {
            background: #005fc1;
            transform: scale(0.97);
        }
        .version {
            margin-top: 20px;
            font-size: 14px;
            color: #8e8e93;
        }
        .note {
            margin-top: 24px;
            font-size: 12px;
            color: #8e8e93;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="itms-services://?action=download-manifest&url=https://shmaks911.github.io/manifest.plist" 
       class="btn" 
       id="installBtn">
        📲 Установить Grino
    </a>
    <div class="version">Версия 1.1.1</div>
    <div class="note">
        Открывайте в Safari. При запросе пароля используйте App‑Specific Password.
    </div>
</div>

<script>
    document.getElementById('installBtn').addEventListener('click', function(e) {
        var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        if (!isSafari) {
            e.preventDefault();
            alert('Пожалуйста, откройте эту страницу в Safari на iPhone или iPad.');
        }
    });
</script>
</body>
</html>
